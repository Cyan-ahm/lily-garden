<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Lily Garden</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <div class="garden">
        <div class="sky"></div>
        <div class="ground"></div>
        <!--First Flower-->
        <div class="lily lily-1">
            <div class="stem"></div>
            <div class="leaf leaf-left"></div>
            <div class="leaf leaf-right"></div>
            <div class="flower">
                <div class="petal petal-1"></div>
                <div class="petal petal-2"></div>
                <div class="petal petal-3"></div>
                <div class="petal petal-4"></div>
                <div class="petal petal-5"></div>
                <div class="center"></div>
            </div>
        </div>
        <!--Second Flower-->
        <div class="lily lily-2">
            <div class="stem"></div>
            <div class="leaf leaf-left"></div>
            <div class="leaf leaf-right"></div>
            <div class="flower">
                <div class="petal petal-1"></div>
                <div class="petal petal-2"></div>
                <div class="petal petal-3"></div>
                <div class="petal petal-4"></div>
                <div class="petal petal-5"></div>
                <div class="center"></div>
            </div>
        </div>
        <!--Third Flower-->
        <div class="lily lily-3">
            <div class="stem"></div>
            <div class="leaf leaf-left"></div>
            <div class="leaf leaf-right"></div>
            <div class="flower">
                <div class="petal petal-1"></div>
                <div class="petal petal-2"></div>
                <div class="petal petal-3"></div>
                <div class="petal petal-4"></div>
                <div class="petal petal-5"></div>
                <div class="center"></div>
            </div>
        </div>
        <!--Butterfly-->
        <div class="butterfly butterfly-1">
            <div class="wing wing-left"></div>
            <div class="wing wing-right"></div>
            <div class="butterfly-body"></div>
        </div>

        <div class="butterfly butterfly-2">
            <div class="wing wing-left"></div>
            <div class="wing wing-right"></div>
            <div class="butterfly-body"></div>
        </div>

        <div class="butterfly butterfly-3" id="follower-butterfly">
            <div class="wing wing-left"></div>
            <div class="wing wing-right"></div>
            <div class="butterfly-body"></div>
        </div>

        <!--Cats-->
        <div class="cat cat-1" id="cat-1">
            <div class="cat-ear cat-ear-left"></div>
            <div class="cat-ear cat-ear-right"></div>
            <div class="cat-head">
                <div class="cat-eye cat-eye-left"></div>
                <div class="cat-eye cat-eye-right"></div>
                <div class="cat-nose"></div>
            </div>
            <div class="cat-body"></div>
            <div class="cat-tail"></div>
            <div class="speech-bubble" id="bubble-1">Meow!</div>
        </div>

        <div class="cat cat-2" id="cat-2">
            <div class="cat-ear cat-ear-left"></div>
            <div class="cat-ear cat-ear-right"></div>
            <div class="cat-head">
                <div class="cat-eye cat-eye-left"></div>
                <div class="cat-eye cat-eye-right"></div>
                <div class="cat-nose"></div>
            </div>
            <div class="cat-body"></div>
            <div class="cat-tail"></div>
            <div class="speech-bubble" id="bubble-2">Purr...</div>
        </div>
    </div>
    <script src="script.js"></script>
</body>
</html>
